<!DOCTYPE html>
<html>
<head>
  <title>FOX Retention</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<h2>FOX Local Retention</h2>
<script>
window.onload = function () {

  const canvas = document.getElementById("myChart");

  if (!canvas) {
    document.body.innerHTML += "<p>Canvas not found</p>";
    return;
  }

  new Chart(canvas, {
    type: 'line',
    data: {
      labels: ["Jan 5","Jan 12","Jan 19","Jan 26","Feb 2","Feb 9","Feb 16","Feb 23","Mar 2","Mar 9","Mar 16","Mar 23","Mar 30","Apr 6","Apr 13","Apr 20"],
      datasets: [
        {
          label: "Combined",
          data: [32.56,34.73,47.92,40.32,31.98,34.38,35.48,36.53,35.54,33.98,35.56,35.00,35.02,36.51,48.80,37.94],
          borderWidth: 3
        }
      ]
    },
    options: {
      scales: {
        y: {
          min: 20,
          max: 55,
          ticks: {
            callback: v => v + "%"
          }
        }
      }
    }
  });

};
</script>
</body>
</html>
